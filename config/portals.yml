    query: 'site:jobs.ashbyhq.com "AI Product Manager" OR "Senior Product Manager" OR "ML Product Manager" Europe OR EMEA'
    enabled: true

  - name: Ashby — GenAI PM EMEA
    query: 'site:jobs.ashbyhq.com "Generative AI" OR "GenAI" "Product Manager" Europe OR Germany OR London'
