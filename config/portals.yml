# Career-Ops Portal Scanner — Vilol Joshi
# Regions: EMEA (Germany priority) · MEA (Dubai/Qatar) · SEA (Singapore/Malaysia)
# Roles: AI PM · Gen AI PM · TPM · Senior PM · ML PM · AI Strategy · AI Program Manager

# ── Title filter ──────────────────────────────────────────────────────────────
title_filter:
  positive:
    # Product roles
    - "Product Manager"
    - "Product Owner"
    - "Technical Product Manager"
    - "AI Product Manager"
    - "ML Product Manager"
    - "Data Product Manager"
    - "Product Strategist"
    - "Product Analyst"
    - "Product Operations"
    - "Product Marketing"
    - "TPM"
    - "PMM"
    - "GTM Manager"
    - "Go-to-Market"
    # AI/strategy roles
    - "AI Strategy"
    - "AI Program Manager"
    - "AI Operations"
    - "AI Solutions Manager"
    - "AI Lead"
    - "Conversational AI"
    - "Generative AI"
    - "GenAI"
    - "AI Manager"
    # German equivalents
    - "Produktmanager"
    - "KI Produktmanager"
    - "Digitalisierung"
    - "Transformation"
    - "Strategie"
  negative:
    - "Junior"
    - "Intern"
    - "Internship"
    - "Werkstudent"
    - "Praktikant"
    - "Entry Level"
    - "Graduate"
    - "Trainee"
    - "iOS"
    - "Android"
    - "Frontend Developer"
    - "Backend Developer"
    - "Full Stack"
    - "DevOps"
    - "QA Engineer"
    - "Test Engineer"
    - "Hardware"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "Blockchain"
    - "Web3"
    - "Crypto"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Principal"
    - "Head of"
    - "Director"
    - "Vice President"
    - "VP"
    - "Staff"
    - "Group"

# ── Search queries ─────────────────────────────────────────────────────────────
search_queries:

  # ── EMEA — Greenhouse ──────────────────────────────────────────────────────
  - name: Greenhouse — AI PM EMEA
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Product Manager" OR "Senior Product Manager" Europe OR Germany OR Berlin OR London OR Amsterdam'
    enabled: true

  - name: Greenhouse — GenAI PM EMEA
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Generative AI" "Product Manager" Europe OR EMEA'
    enabled: true

  - name: Greenhouse — Technical PM EMEA
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Technical Product Manager" OR "TPM" AI Europe OR EMEA'
    enabled: true

  # ── EMEA — Ashby ──────────────────────────────────────────────────────────
